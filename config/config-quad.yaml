encoder:
  latent_dim: 8
  weights_path: /encoder-path.pth  # same encoder as triangle runs

decoder:
  d_latent: 8
  d_hidden: 384
  n_layers: 12
  n_heads: 6
  max_faces: 2048
  vocab_size: 257          # covers coords 0-127, TRI_PAD=129, EOS_RESIDUAL=255 (slot-1 STOP),
                            # and TRI_NEIGHBOR=256 (slot-2 triangle marker). Index 256 was the
                            # previously-unused slot, so no output-dim change vs the shared-token
                            # version — existing checkpoints stay loadable.
  n_face_tokens: 12        # unified 12-token block (3 TRI_PAD + 9 coords for tri; 12 coords for quad)
  use_pos_embed: false
  use_spherical_embed: true   # adapted for the 12-token unified block (quad + TRI_PAD-prefixed tri)
  relative: true           # 12-token: anchor on the real v0 (TRI_PAD-aware) + raw logits at the TRI_PAD prefix
  use_edge_cond: true      # 12-token: 6 edge pad + 6 predicted (quad=2 verts; tri=1 vert + EOS marker)

data:
  num_points: 2048
  num_workers: 4
  augment: false           # 3-mesh convergence test: memorize native quads, no aug noise
  face_layout: "quad"

training:
  batch_size: 32           # 12-token faces use ~33% more memory than 9-token; start at 32 on T4
                            # (T4 has 16 GB VRAM; increase to 64 if model fits)
  lr: 6.0e-4
  weight_decay: 0.1
  max_steps: 50000
  grad_clip: 1.0
  warmup_steps: 1000
  save_every: 1000          # local checkpoint interval (steps); Drive sync mirrors this
  val_every_n_steps: 500
  viz_every_n_steps: 2000
  gen_max_ctx: 50           # number of context faces fed to generate() during viz
  gen_max_steps: 200        # max new faces to generate during viz (quad = up to 200 faces)
  eos_weight: 1.0           # MUST stay ~1.0 in edge-cond: EOS is no longer rare here
                            # (every boundary/stop edge + every triangle's slot-2 marker →
                            # perc_eos ≈ 0.2-0.3, vs ~0.0006 in causal mode). Upweighting it
                            # (e.g. 10) makes the model collapse to predicting EOS everywhere
                            # (coord_acc→0, edge_face_type_acc→tri-fraction). eos_weight>1 only
                            # made sense for the causal regime where EOS was <0.1% of tokens.
  mixed_precision: true
  masking:
    - type: causal
      prob: 1.0
  target_builder:
    type: adjacent           # edge-cond requires query_edges → AdjacentTargetBuilder (12-token aware)
  ordering:
    strategies:
      - type: random
        prob: 0.25
      - type: causal_axis
        prob: 0.25
      - type: bfs
        prob: 0.25
      - type: dfs
        prob: 0.25
    post_processing:
      - type: shuffle
        prob: 0.5
        max_fraction: 1.0
  pc_cond_prob: 0.5

# Google Drive checkpoint sync (used by DriveCheckpointCallback in Colab).
# Set drive_dir to null to disable Drive syncing entirely.
drive:
  drive_dir: /content/drive/MyDrive/mesh_genai/runs
  sync_every_n_steps: 1000  # sync more often than save_every for crash safety
  also_sync_logs: true

wandb:
  enabled: true
  project: mesh_genai
  name: null
  tags: ["quad", "phase5"]

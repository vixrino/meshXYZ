encoder:
  latent_dim: 8
  weights_path: /encoder-path.pth  # same encoder as triangle runs

decoder:
  d_latent: 8
  d_hidden: 384
  n_layers: 12
  n_heads: 6
  max_faces: 2048
  vocab_size: 257          # 256 + 1 for TRI_PAD=129
  use_pos_embed: false
  use_spherical_embed: false  # face_cartesian_to_spherical expects 9-coord input; 12-coord not supported
  relative: false          # relative mode anchors on face_input[:,:,:3]; TRI_PAD=129 there is not a coord
  use_edge_cond: false     # AdjacentTargetBuilder assumes 3 edges/face; disabled for quads

data:
  num_points: 2048
  num_workers: 4
  augment: true
  face_layout: "quad"

training:
  batch_size: 64           # 12-token faces use more memory; reduce if OOM on T4
  lr: 6.0e-4
  weight_decay: 0.1
  max_steps: 50000
  grad_clip: 1.0
  warmup_steps: 1000
  save_every: 10000
  val_every_n_steps: 500
  viz_every_n_steps: 2000
  mixed_precision: true
  masking:
    - type: causal
      prob: 1.0
  target_builder:
    type: causal             # AdjacentTargetBuilder is tri-specific; causal is topology-agnostic
  ordering:
    strategies:
      - type: random
        prob: 0.25
      - type: causal_axis
        prob: 0.25
      - type: bfs
        prob: 0.25
      - type: dfs
        prob: 0.25
    post_processing:
      - type: shuffle
        prob: 0.5
        max_fraction: 1.0
  pc_cond_prob: 0.5

wandb:
  enabled: true
  project: mesh_genai
  name: null
  tags: ["quad"]
